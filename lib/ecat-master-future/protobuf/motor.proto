syntax = "proto3";

package iit.advrf;

message Motor_rx_pdo {
    float link_pos = 1;
    float link_vel = 2;
    float torque   = 3;
}

message Motor_tx_pdo {
    float pos_ref     = 1;
    float vel_ref     = 2; 
    float torque_ffwd = 3; 
}

// 20 bytes per motor (e.g., 20bytes*12 = 250bytes)
message MotorState {
  repeated Motor_rx_pdo motors = 1;   
  int32  sec                   = 2;
  uint32 nanosec               = 3;
}

message MotorCmd {
  repeated Motor_tx_pdo motors = 1;  
  int32  sec                   = 2;
  uint32 nanosec               = 3;
}