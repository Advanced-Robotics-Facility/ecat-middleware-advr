syntax = "proto3";

package iit.advrf;

import "msg_header.proto";
import "motor_pdo.proto";
import "ft6_pdo.proto";
import "power_pack_pdo.proto";
import "imu_pdo.proto";
import "cia402.proto";
import "hyq.proto";
import "gripper_pdo.proto";
import "generic.proto";

message Ec_slave_pdo {

     enum Type { 
        _UNSPECIFIED = 0;
        RX_MOTOR = 1;       TX_MOTOR = 2;
        RX_FT6 = 3;         TX_FT6 = 4;
        RX_POW_WLK = 5;     TX_POW_WLK = 6;
        RX_POW_CMN = 7;     TX_POW_CMN = 8;
        RX_XT_MOTOR = 9;    TX_XT_MOTOR = 10;
        RX_FOOT_SENS = 11;  TX_FOOT_SENS = 12;
        RX_MC_HAND = 13;    TX_MC_HAND = 14;
        RX_IMU_VN = 15;     TX_IMU_VN = 16;
        RX_SKIN_SENS = 17;  TX_SKIN_SENS = 18;
        RX_HERI_HAND = 19;  TX_HERI_HAND = 20;
        RX_POW_F28M36 = 21; TX_POW_F28M36 = 22;
        RX_GENERIC = 23;    TX_GENERIC = 24;
        RX_CIA402 = 31;     TX_CIA402 = 32;
        RX_HYQ_KNEE = 33;   TX_HYQ_KNEE = 34;
        RX_HYQ_HPU = 35;    TX_HYQ_HPU = 36;
        RX_GRIPPER = 37;    TX_GRIPPER = 38;
        DUMMY = 101;
        CLIENT_PIPE = 111;
        
    }

    // Identifies which field is filled in.
    Type   type = 1;
    
    Header header = 2;
    
    Motor_tx_pdo       motor_tx_pdo = 3;
    Motor_rx_pdo       motor_rx_pdo = 4;
    Motor_xt_tx_pdo    motor_xt_tx_pdo = 5;
    Motor_xt_rx_pdo    motor_xt_rx_pdo = 6;
    FT6_tx_pdo         ft6_tx_pdo = 7;
    FT6_rx_pdo         ft6_rx_pdo = 8;
    ImuVN_rx_pdo       imuVN_rx_pdo = 9;
    PowF28M36_tx_pdo   powF28M36_tx_pdo = 10;
    PowF28M36_rx_pdo   powF28M36_rx_pdo = 11;
    Cia402_tx_pdo      cia402_tx_pdo = 12;
    Cia402_rx_pdo      cia402_rx_pdo = 13;
    HyqKnee_tx_pdo     hyqKnee_tx_pdo = 14;
    HyqKnee_rx_pdo     hyqKnee_rx_pdo = 15;
    HyqHpu_tx_pdo      hyqHpu_tx_pdo = 16;
    HyqHpu_rx_pdo      hyqHpu_rx_pdo = 17;
    Gripper_rx_pdo     Gripper_rx_pdo = 18;
    Gripper_tx_pdo     Gripper_tx_pdo = 19;
    Dummy              dummy_pdo = 30;
    Client_pipe        client_pdo = 31;
}
